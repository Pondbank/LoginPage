<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEO-Guessr Clone Login</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #f4870d;
            --bg-color: #f0f2f5;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--primary-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            width: 350px;
        }

        h2 { text-align: center; color: var(--primary-color); margin-bottom: 1.5rem; }

        .form-group { margin-bottom: 1rem; }

        label { display: block; margin-bottom: 0.3rem; font-size: 0.9rem; color: #666; }

        input {
            width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box;
        }

        button {
            width: 100%; padding: 10px; background-color: var(--primary-color); color: white; 
            border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; margin-top: 10px;
        }

        button:hover { opacity: 0.9; }

        .secondary-btn { background-color: transparent; color: #666; margin-top: 5px; font-size: 0.8rem; }

        .switch-link { text-align: center; margin-top: 1rem; font-size: 0.9rem; }
        
        .error-msg { color: red; text-align: center; font-size: 0.85rem; display: none; margin-bottom: 10px;}

        .hidden { display: none; }

        #logo-area { text-align: center; font-weight: bold; color: var(--accent-color); margin-bottom: 20px; letter-spacing: -1px; }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="logo-area" style="display:none;">GEO<br><span style="color:#333">GUSSR</span></h1>
        
        <form id="loginForm" onsubmit="handleLogin(event)">
            <h2>Welcome Back</h2>
            
            <div class="form-group">
                <label for="loginUsername">Email / Username</label>
                <input type="text" id="loginUsername" placeholder="Enter your email or username" required>
            </div>
            <div class="form-group">
                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" placeholder="Enter password" required>
            </div>
            <button type="submit">Log In</button>
            
            <div id="loginError" class="error-msg"></div>

            <div class="switch-link">
                <a href="#" onclick="showSection('register')">Create an account</a><br>
                <a href="#" onclick="showSection('forgot')" style="font-size: 0.8rem;">Forgot Password?</a>
            </div>
        </form>

        <form id="registerForm" class="hidden" onsubmit="handleRegister(event)">
            <h2>Create Account</h2>
            <p style="font-size: 0.8rem; text-align:center;">By joining, you agree to play.</p>
            
            <div class="form-group">
                <label for="regUsername">Email / Username</label>
                <input type="text" id="regUsername" placeholder="Choose a username/email" required>
            </div>
            <div class="form-group">
                <label for="regPassword">Password</label>
                <input type="password" id="regPassword" placeholder="Create password (min 4 chars)" required>
            </div>
            <button type="submit">Register</button>

            <div class="switch-link">
                <a href="#" onclick="showSection('login')">Already have an account? Log In</a>
            </div>
        </form>

        <form id="forgotForm" class="hidden" onsubmit="handleForgot(event)">
            <h2>Reset Password</h2>
            <p style="font-size: 0.8rem; text-align:center;">Enter your username to reset.</p>
            
            <div class="form-group">
                <label for="forgotUsername">Email / Username</label>
                <input type="text" id="forgotUsername" placeholder="Enter username" required>
            </div>
            <div class="form-group">
                <label for="newPassword">New Password</label>
                <input type="password" id="newPassword" placeholder="Set a new password" required>
            </div>
            
            <button type="submit">Reset Password</button>

            <div class="switch-link">
                <a href="#" onclick="showSection('login')">Back to Login</a>
            </div>
        </form>
    </div>

    <script>
        // --- UI LOGIC (Toggling forms) ---

        function showSection(sectionName) {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('forgotForm').classList.add('hidden');
            
            if(sectionName === 'login') {
                document.getElementById('loginForm').classList.remove('hidden');
            } else if(sectionName === 'register') {
                document.querySelector('.container h1#logo-area').style.display = "none"; 
                document.getElementById('registerForm').classList.remove('hidden');
            } else if(sectionName === 'forgot') {
                document.querySelector('.container h1#logo-area').style.display = "block";
                document.getElementById('forgotForm').classList.remove('hidden');
            }
        }

        function clearError() {
            const errDiv = document.getElementById('loginError');
            if(errDiv) {
                errDiv.textContent = "";
                errDiv.style.display = 'none';
            }
        }

        // --- NETWORK LOGIC (Talking to Node.js) ---

        async function handleRegister(e) {
            e.preventDefault();
            const usernameInput = document.getElementById('regUsername').value;
            const passwordInput = document.getElementById('regPassword').value;
            
            if (passwordInput.length < 4) {
                alert("Password must be at least 4 characters long.");
                return;
            }

            try {
                const response = await fetch('http://localhost:3000/api/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ username: usernameInput, password: passwordInput })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || "Registration failed");
                }

                alert("Registration successful! Redirecting...");
                document.getElementById('regUsername').value = '';
                document.getElementById('regPassword').value = '';
                
                setTimeout(() => showSection('login'), 1000); 

            } catch (error) {
                console.error(error);
                alert("Error: " + error.message); 
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const usernameInput = document.getElementById('loginUsername').value;
            const passwordInput = document.getElementById('loginPassword').value;

            clearError(); 

            try {
                const response = await fetch('http://localhost:3000/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ username: usernameInput, password: passwordInput })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || "Login failed");
                }

                // SUCCESS - Redirects straight to the game
                window.location.href = "https://www.geoguessr.com";
                
            } catch (error) {
                console.error(error);
                const errDiv = document.getElementById('loginError');
                errDiv.textContent = error.message;
                errDiv.style.display = 'block';
            }
        }

        async function handleForgot(e) {
            e.preventDefault();
            const usernameInput = document.getElementById('forgotUsername').value;
            const newPasswordInput = document.getElementById('newPassword').value;

            try {
                const response = await fetch('http://localhost:3000/api/forgot-password', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ username: usernameInput, newPassword: newPasswordInput })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || "Failed to reset password");
                }

                alert("Password reset successful! Please log in.");
                
                document.getElementById('forgotUsername').value = '';
                document.getElementById('newPassword').value = '';
                
                showSection('login');

            } catch (error) {
                console.error(error);
                alert("Error: " + error.message);
            }
        }
    </script>
</body>
</html>
